services:

  db:
    image: postgres:16
    container_name: petshop_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petshop

    ports:
      - "5432:5432"

    volumes:
      - ./sql:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .

    container_name: petshop_app

    stdin_open: true
    tty: true

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy
